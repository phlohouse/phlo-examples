# Phlo Infrastructure Stack
# Generated by: phlo services init
# Dev mode: false
# Modify phlo.yaml (env:) for defaults and .phlo/.env.local for secrets

services:
  postgres-volume-setup:
    image: alpine:3.20
    restart: 'no'
    user: 0:0
    volumes:
    - postgres-data:/var/lib/postgresql/data
    command: '-c " mkdir -p /var/lib/postgresql/data && chown -R 70:70 /var/lib/postgresql/data
      && chmod 700 /var/lib/postgresql/data && echo ''Postgres data volume ownership
      initialized'' "

      '
    entrypoint: /bin/sh
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: minio:9000
      phlo.metrics.path: /minio/v2/metrics/cluster
      traefik.enable: 'true'
      traefik.http.routers.minio.rule: Host(`minio.${TRAEFIK_DOMAIN:-phlo.localhost}`)
      traefik.http.routers.minio.entrypoints: web
      traefik.http.routers.minio.service: minio
      traefik.http.services.minio.loadbalancer.server.port: '9001'
      traefik.http.routers.minio-api.rule: Host(`minio-api.${TRAEFIK_DOMAIN:-phlo.localhost}`)
      traefik.http.routers.minio-api.entrypoints: web
      traefik.http.routers.minio-api.service: minio-api
      traefik.http.services.minio-api.loadbalancer.server.port: '9000'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-}
      MINIO_IDENTITY_OPENID_CONFIG_URL: ${MINIO_OIDC_CONFIG_URL:-}
      MINIO_IDENTITY_OPENID_CLIENT_ID: ${MINIO_OIDC_CLIENT_ID:-}
      MINIO_IDENTITY_OPENID_CLIENT_SECRET: ${MINIO_OIDC_CLIENT_SECRET:-}
      MINIO_IDENTITY_OPENID_CLAIM_NAME: ${MINIO_OIDC_CLAIM_NAME:-policy}
      MINIO_IDENTITY_OPENID_SCOPES: ${MINIO_OIDC_SCOPES:-openid}
      MINIO_IDENTITY_LDAP_SERVER_ADDR: ${MINIO_LDAP_SERVER:-}
      MINIO_IDENTITY_LDAP_LOOKUP_BIND_DN: ${MINIO_LDAP_BIND_DN:-}
      MINIO_IDENTITY_LDAP_LOOKUP_BIND_PASSWORD: ${MINIO_LDAP_BIND_PASSWORD:-}
      MINIO_IDENTITY_LDAP_USER_DN_SEARCH_BASE_DN: ${MINIO_LDAP_USER_BASE_DN:-}
      MINIO_IDENTITY_LDAP_USER_DN_SEARCH_FILTER: ${MINIO_LDAP_USER_FILTER:-}
      MINIO_KMS_AUTO_ENCRYPTION: ${MINIO_AUTO_ENCRYPTION:-off}
      MINIO_AUDIT_WEBHOOK_ENABLE: ${MINIO_AUDIT_ENABLED:-off}
      MINIO_AUDIT_WEBHOOK_ENDPOINT: ${MINIO_AUDIT_ENDPOINT:-}
    ports:
    - ${MINIO_API_PORT:-9000}:9000
    - ${MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
    - minio-data:/data
    command:
    - server
    - /data
    - --console-address
    - :9001
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9000/minio/health/ready
      interval: 10s
      timeout: 5s
      retries: 10
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'false'
      phlo.grafana.datasource: 'true'
      phlo.grafana.datasource.type: postgres
      phlo.grafana.datasource.name: PostgreSQL
      phlo.grafana.datasource.url: postgres:5432
      phlo.grafana.datasource.database: ${POSTGRES_DB:-phlo}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phlo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phlo}
      POSTGRES_DB: ${POSTGRES_DB:-phlo}
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-prefer}
    ports:
    - ${POSTGRES_PORT:-5432}:5432
    volumes:
    - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-phlo}
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres-volume-setup:
        condition: service_completed_successfully
  minio-setup:
    image: minio/mc:latest
    restart: 'no'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    entrypoint: '/bin/sh -c " sleep 5 && mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER}
      $${MINIO_ROOT_PASSWORD} && mc mb --ignore-existing myminio/lake && mc mb --ignore-existing
      myminio/lake/warehouse && mc mb --ignore-existing myminio/lake/stage && echo
      ''Buckets created successfully'' "

      '
    depends_on:
      minio:
        condition: service_healthy
  nessie:
    image: ghcr.io/projectnessie/nessie:${NESSIE_VERSION:-0.107.2}
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: nessie:19120
      phlo.metrics.path: /q/metrics
      traefik.enable: 'true'
      traefik.http.routers.nessie.rule: Host(`nessie.${TRAEFIK_DOMAIN:-phlo.localhost}`)
      traefik.http.routers.nessie.entrypoints: web
      traefik.http.services.nessie.loadbalancer.server.port: '19120'
    environment:
      NESSIE_VERSION_STORE_TYPE: JDBC
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-phlo}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-phlo}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-phlo}
      nessie.catalog.default-warehouse: warehouse
      nessie.catalog.warehouses.warehouse.location: s3://lake/warehouse
      nessie.catalog.service.s3.default-options.endpoint: http://minio:9000/
      nessie.catalog.service.s3.default-options.path-style-access: 'true'
      nessie.catalog.service.s3.default-options.region: us-east-1
      nessie.catalog.service.s3.default-options.access-key: urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key
      nessie.catalog.secrets.access-key.name: ${MINIO_ROOT_USER:-minio}
      nessie.catalog.secrets.access-key.secret: ${MINIO_ROOT_PASSWORD:-minio123}
      QUARKUS_OIDC_ENABLED: ${NESSIE_OIDC_ENABLED:-false}
      QUARKUS_OIDC_AUTH_SERVER_URL: ${NESSIE_OIDC_SERVER_URL:-}
      QUARKUS_OIDC_CLIENT_ID: ${NESSIE_OIDC_CLIENT_ID:-}
      QUARKUS_OIDC_CREDENTIALS_SECRET: ${NESSIE_OIDC_CLIENT_SECRET:-}
      QUARKUS_OIDC_TOKEN_ISSUER: ${NESSIE_OIDC_ISSUER:-}
      NESSIE_SERVER_AUTHORIZATION_ENABLED: ${NESSIE_AUTHZ_ENABLED:-false}
    ports:
    - ${NESSIE_PORT:-19120}:19120
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:19120/api/v1/config
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
  trino:
    image: trinodb/trino:${TRINO_VERSION:-467}
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'false'
      phlo.grafana.datasource: 'true'
      phlo.grafana.datasource.type: trino
      phlo.grafana.datasource.name: Trino
      phlo.grafana.datasource.url: trino:8080
      traefik.enable: 'true'
      traefik.http.routers.trino.rule: Host(`trino.${TRAEFIK_DOMAIN:-phlo.localhost}`)
      traefik.http.routers.trino.entrypoints: web
      traefik.http.services.trino.loadbalancer.server.port: '8080'
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_PATH_STYLE_ACCESS: 'true'
    ports:
    - ${TRINO_PORT:-8080}:8080
    volumes:
    - ./trino:/etc/trino:ro
    healthcheck:
      test:
      - CMD-SHELL
      - '[ "$(curl -fsS http://127.0.0.1:8080/v1/info/state | tr -d ''"'')" = "ACTIVE"
        ]'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    mem_limit: 3g
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
  dagster:
    build:
      context: .
      dockerfile: dagster/Dockerfile
      args:
        PHLO_VERSION: ${PHLO_VERSION:-}
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: dagster:3000
      phlo.metrics.path: /metrics
      traefik.enable: 'true'
      traefik.http.routers.dagster.rule: Host(`dagster.${TRAEFIK_DOMAIN:-phlo.localhost}`)
      traefik.http.routers.dagster.entrypoints: web
      traefik.http.services.dagster.loadbalancer.server.port: '3000'
    environment:
      DAGSTER_HOME: /opt/dagster
      PYTHONPATH: /opt/dagster:/app
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_ACCESS_KEY_ID: ${DAGSTER_MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minio}}
      AWS_SECRET_ACCESS_KEY: ${DAGSTER_MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minio123}}
      AWS_REGION: us-east-1
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_USE_SSL: 'false'
      AWS_S3_URL_STYLE: path
      NESSIE_HOST: nessie
      NESSIE_PORT: 19120
      TRINO_HOST: trino
      TRINO_USER: ${DAGSTER_TRINO_USER:-phlo-dagster}
      TRINO_ROLE: ${DAGSTER_TRINO_ROLE:-}
      TRINO_PORT: 8080
      TRINO_CATALOG: iceberg
      ICEBERG_WAREHOUSE_PATH: s3://lake/warehouse
      ICEBERG_STAGING_PATH: s3://lake/stage
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${DAGSTER_POSTGRES_USER:-${POSTGRES_USER:-phlo}}
      POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:-${POSTGRES_PASSWORD:-phlo}}
      POSTGRES_DB: ${POSTGRES_DB:-phlo}
      WORKFLOWS_PATH: /app/workflows
      DBT_PROJECT_DIR: /app/workflows/transforms/dbt
      PHLO_PROJECT_PATH: /app
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      PHLO_HOST_PLATFORM: ${PHLO_HOST_PLATFORM:-}
      DISABLE_PANDERA_IMPORT_WARNING: 'True'
    ports:
    - ${DAGSTER_PORT:-3000}:3000
    volumes:
    - ./dagster:/opt/dagster
    - ../phlo.yaml:/app/phlo.yaml:ro
    - ../contracts:/app/contracts
    - ../data:/app/data
    - ../plugins:/app/plugins
    - ../workflows:/app/workflows
    - ../tests:/app/tests:ro
    env_file:
    - .env
    - .env.local
    command:
    - dagster-webserver
    - -h
    - 0.0.0.0
    - -p
    - '3000'
    - -w
    - /opt/dagster/workspace.yaml
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
      trino:
        condition: service_healthy
  dagster-daemon:
    build:
      context: .
      dockerfile: dagster/Dockerfile
      args:
        PHLO_VERSION: ${PHLO_VERSION:-}
    restart: unless-stopped
    environment:
      DAGSTER_HOME: /opt/dagster
      PYTHONPATH: /opt/dagster:/app
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_REGION: us-east-1
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_USE_SSL: 'false'
      AWS_S3_URL_STYLE: path
      NESSIE_HOST: nessie
      NESSIE_PORT: 19120
      TRINO_HOST: trino
      TRINO_PORT: 8080
      TRINO_CATALOG: iceberg
      ICEBERG_WAREHOUSE_PATH: s3://lake/warehouse
      ICEBERG_STAGING_PATH: s3://lake/stage
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-phlo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phlo}
      POSTGRES_DB: ${POSTGRES_DB:-phlo}
      WORKFLOWS_PATH: /app/workflows
      DBT_PROJECT_DIR: /app/workflows/transforms/dbt
      PHLO_PROJECT_PATH: /app
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      PHLO_HOST_PLATFORM: ${PHLO_HOST_PLATFORM:-}
      DISABLE_PANDERA_IMPORT_WARNING: 'True'
    volumes:
    - ./dagster:/opt/dagster
    - ../phlo.yaml:/app/phlo.yaml:ro
    - ../contracts:/app/contracts
    - ../data:/app/data
    - ../plugins:/app/plugins
    - ../workflows:/app/workflows
    - ../tests:/app/tests:ro
    env_file:
    - .env
    - .env.local
    command:
    - dagster-daemon
    - run
    - -w
    - /opt/dagster/workspace.yaml
    depends_on:
      dagster:
        condition: service_started
volumes:
  minio-data: {}
  postgres-data: {}
