# Phlo Infrastructure Stack
# Generated by: phlo services init
# Dev mode: true
# Modify phlo.yaml (env:) for defaults and .phlo/.env.local for secrets

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: minio:9000
      phlo.metrics.path: /minio/v2/metrics/cluster
      traefik.enable: 'true'
      traefik.http.routers.minio.rule: Host(`minio.${TRAEFIK_DOMAIN:-phlo.localhost}`)
      traefik.http.routers.minio.entrypoints: web
      traefik.http.routers.minio.service: minio
      traefik.http.services.minio.loadbalancer.server.port: '9001'
      traefik.http.routers.minio-api.rule: Host(`minio-api.${TRAEFIK_DOMAIN:-phlo.localhost}`)
      traefik.http.routers.minio-api.entrypoints: web
      traefik.http.routers.minio-api.service: minio-api
      traefik.http.services.minio-api.loadbalancer.server.port: '9000'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-}
      MINIO_IDENTITY_OPENID_CONFIG_URL: ${MINIO_OIDC_CONFIG_URL:-}
      MINIO_IDENTITY_OPENID_CLIENT_ID: ${MINIO_OIDC_CLIENT_ID:-}
      MINIO_IDENTITY_OPENID_CLIENT_SECRET: ${MINIO_OIDC_CLIENT_SECRET:-}
      MINIO_IDENTITY_OPENID_CLAIM_NAME: ${MINIO_OIDC_CLAIM_NAME:-policy}
      MINIO_IDENTITY_OPENID_SCOPES: ${MINIO_OIDC_SCOPES:-openid}
      MINIO_IDENTITY_LDAP_SERVER_ADDR: ${MINIO_LDAP_SERVER:-}
      MINIO_IDENTITY_LDAP_LOOKUP_BIND_DN: ${MINIO_LDAP_BIND_DN:-}
      MINIO_IDENTITY_LDAP_LOOKUP_BIND_PASSWORD: ${MINIO_LDAP_BIND_PASSWORD:-}
      MINIO_IDENTITY_LDAP_USER_DN_SEARCH_BASE_DN: ${MINIO_LDAP_USER_BASE_DN:-}
      MINIO_IDENTITY_LDAP_USER_DN_SEARCH_FILTER: ${MINIO_LDAP_USER_FILTER:-}
      MINIO_KMS_AUTO_ENCRYPTION: ${MINIO_AUTO_ENCRYPTION:-off}
      MINIO_AUDIT_WEBHOOK_ENABLE: ${MINIO_AUDIT_ENABLED:-off}
      MINIO_AUDIT_WEBHOOK_ENDPOINT: ${MINIO_AUDIT_ENDPOINT:-}
    ports:
    - ${MINIO_API_PORT:-9000}:9000
    - ${MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
    - ./volumes/minio:/data
    - ./volumes/minio-certs:/root/.minio/certs:ro
    command:
    - server
    - /data
    - --console-address
    - :9001
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9000/minio/health/ready
      interval: 10s
      timeout: 5s
      retries: 10
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'false'
      phlo.grafana.datasource: 'true'
      phlo.grafana.datasource.type: postgres
      phlo.grafana.datasource.name: PostgreSQL
      phlo.grafana.datasource.url: postgres:5432
      phlo.grafana.datasource.database: ${POSTGRES_DB:-phlo}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phlo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phlo}
      POSTGRES_DB: ${POSTGRES_DB:-phlo}
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-prefer}
    ports:
    - ${POSTGRES_PORT:-5432}:5432
    volumes:
    - ./volumes/postgres:/var/lib/postgresql/data
    - ./volumes/postgres-certs:/var/lib/postgresql/certs:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-phlo}
      interval: 10s
      timeout: 5s
      retries: 10
  alloy:
    image: grafana/alloy:v1.4.2
    profiles:
    - observability
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: alloy:12345
      phlo.metrics.path: /metrics
    ports:
    - ${ALLOY_PORT:-12345}:12345
    volumes:
    - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
    - run
    - --server.http.listen-addr=0.0.0.0:12345
    - /etc/alloy/config.alloy
    healthcheck:
      test:
      - CMD
      - pgrep
      - alloy
      interval: 10s
      timeout: 5s
      retries: 5
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.1.0}
    profiles:
    - observability
    restart: unless-stopped
    user: '0'
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: prometheus:9090
      phlo.metrics.path: /metrics
    ports:
    - ${PROMETHEUS_PORT:-9090}:9090
    volumes:
    - ./prometheus:/etc/prometheus:ro
    - ./volumes/prometheus:/prometheus
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --web.enable-lifecycle
    - --storage.tsdb.retention.time=30d
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:9090/-/healthy
      interval: 10s
      timeout: 5s
      retries: 5
  loki:
    image: grafana/loki:${LOKI_VERSION:-3.2.1}
    profiles:
    - observability
    restart: unless-stopped
    user: '0'
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: loki:3100
      phlo.metrics.path: /metrics
    ports:
    - ${LOKI_PORT:-3100}:3100
    volumes:
    - ./loki:/etc/loki:ro
    - ./volumes/loki:/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:3100/ready
      interval: 10s
      timeout: 5s
      retries: 5
  clickstack:
    image: ${CLICKSTACK_IMAGE:-docker.hyperdx.io/hyperdx/hyperdx-all-in-one}
    profiles:
    - observability
    restart: unless-stopped
    user: '0'
    ports:
    - ${CLICKSTACK_PORT:-8080}:8080
    - ${CLICKSTACK_OTLP_GRPC_PORT:-4317}:4317
    - ${CLICKSTACK_OTLP_HTTP_PORT:-4318}:4318
    - ${CLICKSTACK_NATIVE_PORT:-9000}:9000
    volumes:
    - ./volumes/clickstack:/var/lib/clickhouse
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:8080
      interval: 10s
      timeout: 5s
      retries: 10
  openmetadata-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    profiles:
    - openmetadata
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: ${OPENMETADATA_ES_JAVA_OPTS:--Xms256m -Xmx256m}
      xpack.security.enabled: 'false'
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - curl -s http://localhost:9200/_cluster/health?pretty | grep status | grep
        -qE 'green|yellow'
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
  openmetadata-mysql:
    image: docker.getcollate.io/openmetadata/db:${OPENMETADATA_VERSION:-1.9.7}
    profiles:
    - openmetadata
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${OPENMETADATA_DB_ROOT_PASSWORD:-password}
    command: --sort_buffer_size=10M
    healthcheck:
      test:
      - CMD
      - mysqladmin
      - ping
      - --silent
      - --host=127.0.0.1
      - --user=root
      - --password=$$MYSQL_ROOT_PASSWORD
      interval: 15s
      timeout: 10s
      retries: 10
  minio-setup:
    image: minio/mc:latest
    restart: 'no'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    entrypoint: '/bin/sh -c " sleep 5 && mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER}
      $${MINIO_ROOT_PASSWORD} && mc mb --ignore-existing myminio/lake && mc mb --ignore-existing
      myminio/lake/warehouse && mc mb --ignore-existing myminio/lake/stage && echo
      ''Buckets created successfully'' "

      '
    depends_on:
      minio:
        condition: service_healthy
  nessie:
    image: ghcr.io/projectnessie/nessie:${NESSIE_VERSION:-0.107.2}
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: nessie:19120
      phlo.metrics.path: /q/metrics
      traefik.enable: 'true'
      traefik.http.routers.nessie.rule: Host(`nessie.${TRAEFIK_DOMAIN:-phlo.localhost}`)
      traefik.http.routers.nessie.entrypoints: web
      traefik.http.services.nessie.loadbalancer.server.port: '19120'
    environment:
      NESSIE_VERSION_STORE_TYPE: JDBC
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-phlo}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-phlo}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-phlo}
      nessie.catalog.default-warehouse: warehouse
      nessie.catalog.warehouses.warehouse.location: s3://lake/warehouse
      nessie.catalog.service.s3.default-options.endpoint: http://minio:9000/
      nessie.catalog.service.s3.default-options.path-style-access: 'true'
      nessie.catalog.service.s3.default-options.region: us-east-1
      nessie.catalog.service.s3.default-options.access-key: urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key
      nessie.catalog.secrets.access-key.name: ${MINIO_ROOT_USER:-minio}
      nessie.catalog.secrets.access-key.secret: ${MINIO_ROOT_PASSWORD:-minio123}
      QUARKUS_OIDC_ENABLED: ${NESSIE_OIDC_ENABLED:-false}
      QUARKUS_OIDC_AUTH_SERVER_URL: ${NESSIE_OIDC_SERVER_URL:-}
      QUARKUS_OIDC_CLIENT_ID: ${NESSIE_OIDC_CLIENT_ID:-}
      QUARKUS_OIDC_CREDENTIALS_SECRET: ${NESSIE_OIDC_CLIENT_SECRET:-}
      QUARKUS_OIDC_TOKEN_ISSUER: ${NESSIE_OIDC_ISSUER:-}
      NESSIE_SERVER_AUTHORIZATION_ENABLED: ${NESSIE_AUTHZ_ENABLED:-false}
    ports:
    - ${NESSIE_PORT:-19120}:19120
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:19120/api/v1/config
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    profiles:
    - observability
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: postgres-exporter:9187
      phlo.metrics.path: /metrics
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-phlo}:${POSTGRES_PASSWORD:-phlo}@postgres:5432/${POSTGRES_DB:-phlo}?sslmode=disable
    ports:
    - ${POSTGRES_EXPORTER_PORT:-9187}:9187
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:9187/metrics
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
  pgweb:
    image: sosedoff/pgweb
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'false'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-phlo}:${POSTGRES_PASSWORD:-phlo}@postgres:5432/${POSTGRES_DB:-phlo}?sslmode=disable
    ports:
    - ${PGWEB_PORT:-8081}:8081
    depends_on:
      postgres:
        condition: service_healthy
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.1}
    profiles:
    - observability
    restart: unless-stopped
    user: '0'
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: grafana:3000
      phlo.metrics.path: /metrics
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
    - ${GRAFANA_PORT:-3003}:3000
    volumes:
    - ./grafana/provisioning:/etc/grafana/provisioning:ro
    - ./grafana/dashboards:/etc/grafana/dashboards:ro
    - ./volumes/grafana:/var/lib/grafana
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:3000/api/health
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
  openmetadata-setup:
    image: docker.getcollate.io/openmetadata/server:${OPENMETADATA_VERSION:-1.9.7}
    profiles:
    - openmetadata
    restart: 'no'
    environment:
      OPENMETADATA_CLUSTER_NAME: ${OPENMETADATA_CLUSTER_NAME:-openmetadata}
      SERVER_PORT: ${OPENMETADATA_PORT:-8585}
      SERVER_ADMIN_PORT: ${OPENMETADATA_ADMIN_PORT:-8586}
      LOG_LEVEL: ${OPENMETADATA_LOG_LEVEL:-INFO}
      DB_DRIVER_CLASS: ${OPENMETADATA_DB_DRIVER_CLASS:-com.mysql.cj.jdbc.Driver}
      DB_SCHEME: ${OPENMETADATA_DB_SCHEME:-mysql}
      DB_PARAMS: ${OPENMETADATA_DB_PARAMS:-allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
      DB_USER: ${OPENMETADATA_DB_USER:-openmetadata_user}
      DB_USER_PASSWORD: ${OPENMETADATA_DB_PASSWORD:-openmetadata_password}
      DB_HOST: ${OPENMETADATA_DB_HOST:-openmetadata-mysql}
      DB_PORT: ${OPENMETADATA_DB_PORT:-3306}
      OM_DATABASE: ${OPENMETADATA_DB_NAME:-openmetadata_db}
      ELASTICSEARCH_HOST: ${OPENMETADATA_ES_HOST:-openmetadata-elasticsearch}
      ELASTICSEARCH_PORT: ${OPENMETADATA_ES_PORT:-9200}
      ELASTICSEARCH_SCHEME: ${OPENMETADATA_ES_SCHEME:-http}
      SEARCH_TYPE: ${OPENMETADATA_SEARCH_TYPE:-elasticsearch}
    command: ./bootstrap/openmetadata-ops.sh migrate
    depends_on:
      openmetadata-mysql:
        condition: service_healthy
      openmetadata-elasticsearch:
        condition: service_healthy
  trino:
    image: trinodb/trino:${TRINO_VERSION:-467}
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'false'
      phlo.grafana.datasource: 'true'
      phlo.grafana.datasource.type: trino
      phlo.grafana.datasource.name: Trino
      phlo.grafana.datasource.url: trino:8080
      traefik.enable: 'true'
      traefik.http.routers.trino.rule: Host(`trino.${TRAEFIK_DOMAIN:-phlo.localhost}`)
      traefik.http.routers.trino.entrypoints: web
      traefik.http.services.trino.loadbalancer.server.port: '8080'
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_PATH_STYLE_ACCESS: 'true'
    ports:
    - ${TRINO_PORT:-8080}:8080
    volumes:
    - ./trino/jvm.config:/etc/trino/jvm.config:ro
    - ./trino/config.properties:/etc/trino/config.properties:ro
    - ./trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/v1/info
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    mem_limit: 3g
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
  openmetadata:
    image: docker.getcollate.io/openmetadata/server:${OPENMETADATA_VERSION:-1.9.7}
    profiles:
    - openmetadata
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'false'
    environment:
      OPENMETADATA_CLUSTER_NAME: ${OPENMETADATA_CLUSTER_NAME:-openmetadata}
      SERVER_PORT: ${OPENMETADATA_PORT:-8585}
      SERVER_ADMIN_PORT: ${OPENMETADATA_ADMIN_PORT:-8586}
      LOG_LEVEL: ${OPENMETADATA_LOG_LEVEL:-INFO}
      OPENMETADATA_HEAP_OPTS: ${OPENMETADATA_HEAP_OPTS:--Xmx384m -Xms384m}
      AUTHENTICATION_PROVIDER: ${OPENMETADATA_AUTH_PROVIDER:-basic}
      AUTHENTICATION_RESPONSE_TYPE: ${OPENMETADATA_AUTH_RESPONSE_TYPE:-id_token}
      AUTHENTICATION_ENABLE_SELF_SIGNUP: ${OPENMETADATA_AUTH_ENABLE_SELF_SIGNUP:-true}
      RSA_PUBLIC_KEY_FILE_PATH: ${OPENMETADATA_RSA_PUBLIC_KEY_FILE_PATH:-./conf/public_key.der}
      RSA_PRIVATE_KEY_FILE_PATH: ${OPENMETADATA_RSA_PRIVATE_KEY_FILE_PATH:-./conf/private_key.der}
      JWT_ISSUER: ${OPENMETADATA_JWT_ISSUER:-open-metadata.org}
      JWT_KEY_ID: ${OPENMETADATA_JWT_KEY_ID:-Gb389a-9f76-gdjs-a92j-0242bk94356}
      DB_DRIVER_CLASS: ${OPENMETADATA_DB_DRIVER_CLASS:-com.mysql.cj.jdbc.Driver}
      DB_SCHEME: ${OPENMETADATA_DB_SCHEME:-mysql}
      DB_PARAMS: ${OPENMETADATA_DB_PARAMS:-allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
      DB_USER: ${OPENMETADATA_DB_USER:-openmetadata_user}
      DB_USER_PASSWORD: ${OPENMETADATA_DB_PASSWORD:-openmetadata_password}
      DB_HOST: ${OPENMETADATA_DB_HOST:-openmetadata-mysql}
      DB_PORT: ${OPENMETADATA_DB_PORT:-3306}
      OM_DATABASE: ${OPENMETADATA_DB_NAME:-openmetadata_db}
      ELASTICSEARCH_HOST: ${OPENMETADATA_ES_HOST:-openmetadata-elasticsearch}
      ELASTICSEARCH_PORT: ${OPENMETADATA_ES_PORT:-9200}
      ELASTICSEARCH_SCHEME: ${OPENMETADATA_ES_SCHEME:-http}
      SEARCH_TYPE: ${OPENMETADATA_SEARCH_TYPE:-elasticsearch}
      PIPELINE_SERVICE_CLIENT_ENABLED: ${OPENMETADATA_PIPELINE_CLIENT_ENABLED:-false}
    ports:
    - ${OPENMETADATA_PORT:-8585}:8585
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - --spider
      - http://localhost:8586/healthcheck
      interval: 15s
      timeout: 10s
      retries: 10
    depends_on:
      openmetadata-mysql:
        condition: service_healthy
      openmetadata-elasticsearch:
        condition: service_healthy
      openmetadata-setup:
        condition: service_completed_successfully
  dagster:
    build:
      context: .
      dockerfile: dagster/Dockerfile
      args:
        PHLO_VERSION: ${PHLO_VERSION:-}
    restart: unless-stopped
    labels:
      phlo.metrics.enabled: 'true'
      phlo.metrics.port: dagster:3000
      phlo.metrics.path: /metrics
      traefik.enable: 'true'
      traefik.http.routers.dagster.rule: Host(`dagster.${TRAEFIK_DOMAIN:-phlo.localhost}`)
      traefik.http.routers.dagster.entrypoints: web
      traefik.http.services.dagster.loadbalancer.server.port: '3000'
    environment:
      DAGSTER_HOME: /opt/dagster
      PYTHONPATH: /opt/dagster:/app
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_REGION: us-east-1
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_USE_SSL: 'false'
      AWS_S3_URL_STYLE: path
      NESSIE_HOST: nessie
      NESSIE_PORT: 19120
      TRINO_HOST: trino
      TRINO_PORT: 8080
      TRINO_CATALOG: iceberg
      ICEBERG_WAREHOUSE_PATH: s3://lake/warehouse
      ICEBERG_STAGING_PATH: s3://lake/stage
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-phlo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phlo}
      POSTGRES_DB: ${POSTGRES_DB:-phlo}
      WORKFLOWS_PATH: /app/workflows
      DBT_PROJECT_DIR: /app/workflows/transforms/dbt
      PHLO_PROJECT_PATH: /app
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      PHLO_HOST_PLATFORM: ${PHLO_HOST_PLATFORM:-}
      DISABLE_PANDERA_IMPORT_WARNING: 'True'
      PHLO_DEV_MODE: 'true'
    ports:
    - ${DAGSTER_PORT:-3000}:3000
    volumes:
    - ./dagster:/opt/dagster
    - ../phlo.yaml:/app/phlo.yaml:ro
    - ../contracts:/app/contracts
    - ../data:/app/data
    - ../plugins:/app/plugins
    - ../workflows:/app/workflows
    - ../tests:/app/tests:ro
    - ../../../phlo/src/phlo/../..:/opt/phlo-dev:rw
    env_file:
    - .env
    - .env.local
    command:
    - dagster-webserver
    - -h
    - 0.0.0.0
    - -p
    - '3000'
    - -w
    - /opt/dagster/workspace.yaml
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
      trino:
        condition: service_healthy
  dagster-daemon:
    build:
      context: .
      dockerfile: dagster/Dockerfile
      args:
        PHLO_VERSION: ${PHLO_VERSION:-}
    restart: unless-stopped
    environment:
      DAGSTER_HOME: /opt/dagster
      PYTHONPATH: /opt/dagster:/app
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_REGION: us-east-1
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_USE_SSL: 'false'
      AWS_S3_URL_STYLE: path
      NESSIE_HOST: nessie
      NESSIE_PORT: 19120
      TRINO_HOST: trino
      TRINO_PORT: 8080
      TRINO_CATALOG: iceberg
      ICEBERG_WAREHOUSE_PATH: s3://lake/warehouse
      ICEBERG_STAGING_PATH: s3://lake/stage
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-phlo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phlo}
      POSTGRES_DB: ${POSTGRES_DB:-phlo}
      WORKFLOWS_PATH: /app/workflows
      DBT_PROJECT_DIR: /app/workflows/transforms/dbt
      PHLO_PROJECT_PATH: /app
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      PHLO_HOST_PLATFORM: ${PHLO_HOST_PLATFORM:-}
      DISABLE_PANDERA_IMPORT_WARNING: 'True'
      PHLO_DEV_MODE: 'true'
    volumes:
    - ./dagster:/opt/dagster
    - ../phlo.yaml:/app/phlo.yaml:ro
    - ../contracts:/app/contracts
    - ../data:/app/data
    - ../plugins:/app/plugins
    - ../workflows:/app/workflows
    - ../tests:/app/tests:ro
    - ../../../phlo/src/phlo/../..:/opt/phlo-dev:rw
    env_file:
    - .env
    - .env.local
    command:
    - dagster-daemon
    - run
    - -w
    - /opt/dagster/workspace.yaml
    depends_on:
      dagster:
        condition: service_started
